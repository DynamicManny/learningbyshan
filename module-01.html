<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Module 1: Customer Service in Policing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBEEF1; --panel:#FFFFFF; --panel-2:#FDF1F4; --grid:#F0D9E1;
  --text:#4A3540; --text-dim:#9B7C88; --text-dimmer:#C7AEB8;
  --brass:#E58CA5; --brass-dim:#C96E89; --steel:#B79FD1; --plum:#C497B8;
  --warn:#E3A06B; --bad:#D97A86; --good:#8FBFA0;
}
*{box-sizing:border-box;}
html,body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:17px; line-height:1.5;}
.mono{font-family:'JetBrains Mono',monospace;}
svg.icon{display:block; flex-shrink:0;}
button{font-family:inherit;}

.app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
header{display:flex; align-items:center; gap:10px; padding:16px 16px 12px; position:sticky; top:0; background:var(--bg); z-index:5; border-bottom:1px solid var(--grid);}
.back-btn{background:var(--panel-2); border:1px solid var(--grid); color:var(--text); width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;}
header h1{font-size:16px; margin:0; flex:1;}
.dots{display:flex; gap:5px;}
.dots span{width:7px; height:7px; border-radius:50%; background:var(--grid);}
.dots span.done{background:var(--brass);}

main{flex:1; padding:14px 16px 40px;}
.home-intro{padding:6px 2px 16px;}
.home-intro h2{font-size:21px; margin:0 0 6px 0;}
.home-intro p{color:var(--text-dim); font-size:15px; margin:0;}

.tile-grid{display:flex; flex-direction:column; gap:10px;}
.tile{display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--grid); border-radius:14px; padding:14px; cursor:pointer; text-align:left;}
.tile:active{border-color:var(--brass-dim);}
.tile-icon{width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.tile-body{flex:1; min-width:0;}
.tile-body h3{margin:0 0 3px 0; font-size:16.5px;}
.tile-body p{margin:0; font-size:13.5px; color:var(--text-dim);}
.tile-check{width:22px; height:22px; border-radius:50%; border:2px solid var(--grid); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--brass);}
.tile-check.done{border-color:var(--brass); background:#FCEFE2;}

h2.section-title{font-size:19px; margin:4px 0 4px 0;}
p.lede{color:var(--text-dim); font-size:14.5px; margin:0 0 16px 0;}

.chip-wrap{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:16px;}
.chip{display:flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--grid); border-radius:18px; padding:7px 12px 7px 8px; font-size:13.5px;}
.chip .ic{color:var(--brass);}
.chip.steel .ic{color:var(--steel);}
h3.sub{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--steel); letter-spacing:.8px; text-transform:uppercase; margin:18px 0 8px 0;}

.tap-item{display:flex; justify-content:space-between; align-items:center; gap:10px; background:var(--panel-2); border:1px solid var(--grid); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; font-size:15.5px;}
.tap-item .tag{font-family:'JetBrains Mono',monospace; font-size:11px; padding:3px 9px; border-radius:10px; flex-shrink:0;}
.tap-item.right{border-color:var(--good);}
.tap-item.wrong{border-color:var(--bad);}
.tag.yes{background:#EAF6EE; color:var(--good);}
.tag.no{background:#FCE9EA; color:var(--bad);}

.card{background:var(--panel); border:1px solid var(--grid); border-radius:16px; padding:18px;}
.scene-row{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.avatar{width:54px; height:54px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--bg);}
.scene-title{font-size:13px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:.5px; text-transform:uppercase;}
.line{font-size:17px; padding:13px 14px; background:var(--panel-2); border-radius:10px; margin-bottom:12px;}

.diag-row{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
.diag-chip{flex:1; min-width:90px; background:var(--panel-2); border:1px solid var(--grid); border-radius:8px; padding:7px 9px; font-size:12px;}
.diag-chip .l{color:var(--text-dimmer); font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.5px; text-transform:uppercase;}
.diag-chip .v{margin-top:2px; font-size:13px;}

.opt{display:block; width:100%; text-align:left; background:var(--panel-2); border:1px solid var(--grid); border-radius:12px; padding:14px 15px; margin-bottom:9px; cursor:pointer; font-size:15.5px; color:var(--text);}
.opt:active{border-color:var(--brass-dim);}
.opt.good{border-color:var(--good); background:#EAF6EE;}
.opt.bad{border-color:var(--bad); background:#FCE9EA;}
.opt[disabled-look]{opacity:.35; pointer-events:none;}

.feedback-row{display:flex; gap:12px; align-items:flex-start; margin-top:14px; padding-top:14px; border-top:1px dashed var(--grid);}
.mood{width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.mood.happy{background:#EAF6EE; color:var(--good);}
.mood.neutral{background:#FCEFE2; color:var(--warn);}
.mood.sad{background:#FCE9EA; color:var(--bad);}
.reaction{font-size:15.5px; color:var(--text-dim); font-style:italic;}

.meter-wrap{margin:14px 0 4px; padding:10px 12px; background:var(--panel-2); border-radius:10px;}
.meter-head{display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px;}
.meter-track{height:7px; background:var(--grid); border-radius:4px; overflow:hidden;}
.meter-fill{height:100%; background:var(--brass); transition:width .3s;}

.btn{display:block; width:100%; font-family:'JetBrains Mono',monospace; font-size:13.5px; letter-spacing:.5px; text-transform:uppercase; background:var(--brass); color:#3A1F2A; border:none; padding:14px; cursor:pointer; border-radius:12px; margin-top:14px;}
.btn:disabled{background:#F0D9E1; color:#C7AEB8;}
.btn.secondary{background:var(--panel-2); border:1px solid var(--grid); color:var(--text);}

.pie-wrap{margin:10px 0;}
.pie-legend{margin-top:12px; display:flex; flex-direction:column; gap:7px;}
.pie-legend div{display:flex; align-items:center; gap:9px; font-size:14.5px;}
.swatch{width:12px; height:12px; border-radius:3px; flex-shrink:0;}

.tf-item{background:var(--panel-2); border:1px solid var(--grid); border-radius:12px; padding:14px; margin-bottom:10px;}
.tf-item p{margin:0 0 10px 0; font-size:15.5px;}
.tf-buttons{display:flex; gap:8px;}
.tf-btn{flex:1; padding:10px; border-radius:9px; border:1px solid var(--grid); background:var(--panel); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.5px; cursor:pointer;}
.tf-btn.sel-good{border-color:var(--good); background:#EAF6EE;}
.tf-btn.sel-bad{border-color:var(--bad); background:#FCE9EA;}
.tf-explain{margin-top:9px; font-size:13.5px; color:var(--text-dim); display:none;}
.tf-explain.show{display:block;}

.result-card{text-align:center; padding:30px 20px; border:2px solid var(--brass); background:#FCEDF1; border-radius:16px;}
.result-card.fail{border-color:var(--bad); background:#FCE9EA;}
.result-score{font-family:'JetBrains Mono',monospace; font-size:40px; color:var(--brass); margin:10px 0;}
.result-card.fail .result-score{color:var(--bad);}
footer{text-align:center; font-size:12px; color:var(--text-dimmer); padding:18px; font-family:'JetBrains Mono',monospace;}
</style>
</head>

/* ---------------- CONFIDENCE METER ---------------- */
function applyDelta(delta){
  state.confidence = Math.max(0, Math.min(100, state.confidence + delta));
  state.trace.push(state.confidence);
  persist();
}
function meterHtml(){
  return '<div class="meter-wrap"><div class="meter-head"><span>CONFIDENCE</span><span>'+state.confidence+'</span></div>' +
    '<div class="meter-track"><div class="meter-fill" style="width:'+state.confidence+'%;"></div></div></div>';
}
function moodFor(delta){ return delta>=10 ? "happy" : (delta<=-8 ? "sad" : "neutral"); }
function moodHtml(delta){
  var m = moodFor(delta);
  return '<div class="mood '+m+'">'+icon(m,24)+'</div>';
}

/* ---------------- LEAVE (PIE) ---------------- */
function renderLeave(){
  renderHeader("Why They Leave", true);
  var html = '<p class="lede">What actually drives customers away.</p>';
  html += '<div class="card pie-wrap"><svg width="160" height="160" viewBox="0 0 160 160" id="pieSvg" style="display:block; margin:0 auto;"></svg>' +
    '<div class="pie-legend">' + pieData.map(function(s){ return '<div><span class="swatch" style="background:'+s.color+';"></span>'+s.label+' &middot; '+s.pct+'%</div>'; }).join('') + '</div></div>';
  html += '<button class="btn" id="doneLeave">Mark Topic Complete</button>';
  document.getElementById("mainView").innerHTML = html;
  var svg = document.getElementById("pieSvg");
  var ns = "http://www.w3.org/2000/svg";
  var r = 60, cx = 80, cy = 80, circumference = 2*Math.PI*r, acc = 0;
  pieData.forEach(function(seg){
    var len = (seg.pct/100)*circumference;
    var c = document.createElementNS(ns,"circle");
    c.setAttribute("r",r); c.setAttribute("cx",cx); c.setAttribute("cy",cy);
    c.setAttribute("fill","none"); c.setAttribute("stroke",seg.color); c.setAttribute("stroke-width","26");
    c.setAttribute("stroke-dasharray", len+" "+(circumference-len));
    c.setAttribute("stroke-dashoffset", -acc);
    c.setAttribute("transform","rotate(-90 "+cx+" "+cy+")");
    svg.appendChild(c);
    acc += len;
  });
  document.getElementById("doneLeave").addEventListener("click", function(){
    state.categoryProgress.leave = true; persist(); goHome();
  });
}

/* ---------------- FINAL QUIZ ---------------- */
function renderFinal(){
  if(state.quizScore !== null){ renderResult(state.quizScore); return; }
  renderHeader("Final Check", true);
  var html = '<p class="lede">14 questions. 70% or higher to pass.</p><div id="quizArea"></div>' +
    '<button class="btn" id="submitQuiz">Submit</button>';
  document.getElementById("mainView").innerHTML = html;
  var area = document.getElementById("quizArea");
  var answers = new Array(quizQuestions.length).fill(null);
  quizQuestions.forEach(function(q, qi){
    var block = document.createElement("div");
    block.style.marginBottom = "16px";
    block.innerHTML = '<p style="font-weight:600; font-size:15.5px; margin-bottom:8px;">'+(qi+1)+'. '+q.q+'</p>';
    var optsWrap = document.createElement("div");
    q.choices.forEach(function(choice, ci){
      var b = document.createElement("button");
      b.className = "opt"; b.textContent = choice;
      b.addEventListener("click", function(){
        Array.prototype.forEach.call(optsWrap.children, function(x){ x.classList.remove("good"); });
        b.classList.add("good");
        answers[qi] = ci;
      });
      optsWrap.appendChild(b);
    });
    block.appendChild(optsWrap);
    area.appendChild(block);
  });
  document.getElementById("submitQuiz").addEventListener("click", function(){
    var unanswered = answers.indexOf(null);
    if(unanswered !== -1){ alert("Question "+(unanswered+1)+" still needs an answer."); return; }
    var correct = 0;
    quizQuestions.forEach(function(q,qi){ if(answers[qi]===q.correct) correct++; });
    var pct = Math.round((correct/quizQuestions.length)*100);
    state.quizScore = pct; persist();
    scormSet("cmi.score.raw", pct);
    scormSet("cmi.completion_status", pct>=70?"completed":"incomplete");
    renderResult(pct);
  });
}


function renderResult(pct){
  renderHeader("Final Check", true);
  var pass = pct >= 70;
  var html = '<div class="result-card '+(pass?"":"fail")+'">' + moodHtml(pass?15:-10) +
    '<div class="result-score">'+pct+'%</div><p>'+(pass?"Nice work, that stuck.":"Worth another pass through the topics.")+'</p></div>';
  document.getElementById("mainView").innerHTML = html;
  if(!pass){
    var retryBtn = document.createElement("button"); retryBtn.className = "btn secondary"; retryBtn.textContent = "Retake";
    document.getElementById("mainView").appendChild(retryBtn);
    retryBtn.addEventListener("click", function(){ state.quizScore = null; persist(); renderAll(); });
  }
}

/* ---------------- MASTER ---------------- */
function renderAll(){
  if(view === "home") renderHome();
  else if(view === "basics") renderBasics();
  else if(view === "words") renderWords();
  else if(view === "people") renderPeople();
  else if(view === "excuses") renderExcuses();
  else if(view === "calls") renderCalls();
  else if(view === "standards") renderStandards();
  else if(view === "leave") renderLeave();
  else if(view === "final") renderFinal();
}
renderAll();
})();
